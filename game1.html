<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>猜數字 · 我的遊戲館</title>
    <style>
        body {
            font-family: 'Segoe UI', '微軟正黑體', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 30px;
            margin: 0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            color: #aaccff;
            font-size: 1.3rem;
            text-decoration: none;
            background: #2d2d44;
            padding: 8px 25px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: #3d3d5c;
            color: white;
        }
        .game-container {
            background: #23233a;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 0 #0d0d1a;
        }
        h2 {
            font-size: 2.5rem;
            margin: 0 0 10px;
            color: #ffd966;
        }
        .best {
            background: #0f1420;
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #ffb347;
        }
        .target-range {
            font-size: 1.3rem;
            background: #0f0f1f;
            padding: 10px;
            border-radius: 60px;
            margin: 20px 0;
        }
        input {
            width: 200px;
            padding: 15px;
            font-size: 2rem;
            text-align: center;
            background: #0d0d1a;
            border: 3px solid #4a6fa5;
            color: white;
            border-radius: 60px;
            outline: none;
            margin: 10px 0;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        button {
            background: #4a6fa5;
            border: none;
            color: white;
            font-size: 1.6rem;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 6px 0 #1e2f47;
        }
        button:hover {
            background: #5f8bca;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #1e2f47;
        }
        button.reset {
            background: #6b4f8f;
            box-shadow: 0 6px 0 #352b47;
        }
        .message {
            font-size: 2rem;
            min-height: 4rem;
            margin: 25px 0 10px;
            padding: 15px;
            background: #0b0b17;
            border-radius: 60px;
            border: 2px solid #4a6fa5;
        }
        .attempts {
            color: #b8d0ff;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">⬅️ 返回主頁</a>
    <div class="game-container">
        <h2>🔢 猜數字</h2>
        <div class="best" id="bestScore">🏆 最佳紀錄：--</div>
        <div class="target-range">1 ~ 100</div>
        <input type="number" id="guessInput" min="1" max="100" placeholder="輸入數字" value="">
        <div class="buttons">
            <button id="guessBtn">猜</button>
            <button id="resetBtn" class="reset">新一局</button>
        </div>
        <div class="message" id="message">請開始猜測</div>
        <div class="attempts" id="attempts">已猜次數：0</div>
    </div>

    <script>
        (function() {
            let secretNumber = Math.floor(Math.random() * 100) + 1;
            let attempts = 0;
            let bestAttempts = localStorage.getItem('guessBest') ? parseInt(localStorage.getItem('guessBest')) : null;

            const guessInput = document.getElementById('guessInput');
            const messageDiv = document.getElementById('message');
            const attemptsSpan = document.getElementById('attempts');
            const bestSpan = document.getElementById('bestScore');

            function updateBestDisplay() {
                if (bestAttempts) {
                    bestSpan.textContent = `🏆 最佳紀錄：${bestAttempts} 次`;
                } else {
                    bestSpan.textContent = `🏆 最佳紀錄：--`;
                }
            }

            function checkAndUpdateBest() {
                if (bestAttempts === null || attempts < bestAttempts) {
                    bestAttempts = attempts;
                    localStorage.setItem('guessBest', bestAttempts);
                    updateBestDisplay();
                    messageDiv.textContent = `🎉 新紀錄！${bestAttempts} 次猜中！ 🎉`;
                }
            }

            function resetGame() {
                secretNumber = Math.floor(Math.random() * 100) + 1;
                attempts = 0;
                guessInput.value = '';
                messageDiv.textContent = '新遊戲開始！輸入 1~100';
                attemptsSpan.textContent = '已猜次數：0';
                guessInput.focus();
            }

            document.getElementById('guessBtn').addEventListener('click', function() {
                const val = parseInt(guessInput.value, 10);
                if (isNaN(val) || val < 1 || val > 100) {
                    messageDiv.textContent = '⚠️ 請輸入 1~100 的數字';
                    return;
                }
                attempts++;
                attemptsSpan.textContent = `已猜次數：${attempts}`;

                if (val === secretNumber) {
                    messageDiv.textContent = `🎉 猜中了！ 就是 ${secretNumber} ！`;
                    checkAndUpdateBest();
                } else if (val < secretNumber) {
                    messageDiv.textContent = '📉 太小了，再大一點';
                } else {
                    messageDiv.textContent = '📈 太大了，再小一點';
                }
                guessInput.value = '';
                guessInput.focus();
            });

            document.getElementById('resetBtn').addEventListener('click', resetGame);

            guessInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('guessBtn').click();
                }
            });

            updateBestDisplay();
            resetGame();
        })();
    </script>
</body>
</html>
