<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>猜數字 · 我的遊戲館</title>
    <style>
        body {
            font-family: 'Segoe UI', '微軟正黑體', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 30px;
            margin: 0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            color: #aaccff;
            font-size: 1.3rem;
            text-decoration: none;
            background: #2d2d44;
            padding: 8px 25px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: #3d3d5c;
            color: white;
        }
        .game-container {
            background: #23233a;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 0 #0d0d1a;
        }
        h2 {
            font-size: 2.5rem;
            margin: 0 0 10px;
            color: #ffd966;
        }
        .best {
            background: #0f1420;
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #ffb347;
        }
        .target-range {
            font-size: 1.3rem;
            background: #0f0f1f;
            padding: 10px;
            border-radius: 60px;
            margin: 20px 0;
        }
        input {
            width: 200px;
            padding: 15px;
            font-size: 2rem;
            text-align: center;
            background: #0d0d1a;
            border: 3px solid #4a6fa5;
            color: white;
            border-radius: 60px;
            outline: none;
            margin: 10px 0;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        button {
            background: #4a6fa5;
            border: none;
            color: white;
            font-size: 1.6rem;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 6px 0 #1e2f47;
        }
        button:hover {
            background: #5f8bca;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #1e2f47;
        }
        button.reset {
            background: #6b4f8f;
            box-shadow: 0 6px 0 #352b47;
        }
        .message {
            font-size: 2rem;
            min-height: 4rem;
            margin: 25px 0 10px;
            padding: 15px;
            background: #0b0b17;
            border-radius: 60px;
            border: 2px solid #4a6fa5;
        }
        .attempts {
            color: #b8d0ff;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link" aria-label="返回遊戲主頁">⬅️ 返回主頁</a>
    
    <!-- 開始畫面 -->
    <div id="startScreen" class="start-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
        <div class="game-container" style="background: #23233a; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 40px; box-shadow: 0 15px 0 #0d0d1a; text-align: center;">
            <h2 style="font-size: 3rem; margin: 0 0 20px; color: #ffd966;">🔢 猜數字</h2>
            <div style="font-size: 1.8rem; color: #aaccff; margin-bottom: 30px;">猜中 1~100 之間的隨機數字</div>
            <div style="font-size: 2rem; color: #ffb347; margin-bottom: 40px; padding: 15px; background: #0f1420; border-radius: 40px; border: 2px solid #4a6fa5;">按任意鍵開始</div>
            <div style="font-size: 1.2rem; color: #7a7a9e; margin-top: 20px;">使用鍵盤輸入數字，按 Enter 或點擊「猜」按鈕</div>
        </div>
    </div>
    
    <!-- 遊戲主畫面 -->
    <div id="gameScreen" class="game-container" role="main" aria-labelledby="game-title" style="display: none;">
        <h2 id="game-title">🔢 猜數字</h2>
        <div class="score-display" style="background: #0f1420; padding: 10px 20px; border-radius: 40px; display: inline-block; margin-bottom: 15px; font-size: 1.5rem; color: #ffb347;">
            分數: <span id="currentScore">0</span>
        </div>
        <div class="best" id="bestScore" aria-live="polite">🏆 最佳紀錄：--</div>
        <div class="target-range" aria-label="猜數字範圍：1到100">1 ~ 100</div>
        <input type="number" id="guessInput" min="1" max="100" placeholder="輸入數字" value=""
               aria-label="輸入猜測的數字" aria-describedby="input-hint">
        <div class="buttons">
            <button id="guessBtn" aria-label="提交猜測">猜</button>
            <button id="resetBtn" class="reset" aria-label="開始新遊戲">新一局</button>
        </div>
        <div class="message" id="message" role="alert" aria-live="assertive">請開始猜測</div>
        <div class="attempts" id="attempts" aria-live="polite">已猜次數：0</div>
        <div id="input-hint" style="display:none;">輸入1到100之間的數字，然後按Enter或點擊猜按鈕</div>
    </div>
    
    <!-- 遊戲結束畫面 -->
    <div id="gameOverScreen" class="game-over-screen" style="display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
        <div class="game-container" style="background: #23233a; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 40px; box-shadow: 0 15px 0 #0d0d1a; text-align: center;">
            <h2 style="font-size: 3rem; margin: 0 0 20px; color: #ff8888;">💀 遊戲結束 💀</h2>
            <div style="font-size: 2rem; color: #ffd966; margin-bottom: 20px;">最終分數: <span id="finalScore">0</span></div>
            <div style="font-size: 1.5rem; color: #aaccff; margin-bottom: 30px;">你用了 <span id="finalAttempts">0</span> 次猜中數字</div>
            <div style="font-size: 1.8rem; color: #ffb347; margin-bottom: 40px; padding: 15px; background: #0f1420; border-radius: 40px; border: 2px solid #4a6fa5;">
                最佳紀錄: <span id="finalBestScore">--</span>
            </div>
            <button id="playAgainBtn" style="background: #4a6fa5; border: none; color: white; font-size: 2rem; padding: 15px 50px; border-radius: 60px; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 8px 0 #1e2f47;">再玩一次</button>
            <div style="font-size: 1.2rem; color: #7a7a9e; margin-top: 30px;">按任意鍵或點擊按鈕重新開始</div>
        </div>
    </div>

    <script>
        (function() {
            const MAX_ATTEMPTS = 20;
            let secretNumber = Math.floor(Math.random() * 100) + 1;
            let attempts = 0;
            let bestAttempts = null;
            let score = 0;
            
            // 獲取DOM元素
            const startScreen = document.getElementById('startScreen');
            const gameScreen = document.getElementById('gameScreen');
            const gameOverScreen = document.getElementById('gameOverScreen');
            const guessInput = document.getElementById('guessInput');
            const messageDiv = document.getElementById('message');
            const attemptsSpan = document.getElementById('attempts');
            const bestSpan = document.getElementById('bestScore');
            const currentScoreSpan = document.getElementById('currentScore');
            const finalScoreSpan = document.getElementById('finalScore');
            const finalAttemptsSpan = document.getElementById('finalAttempts');
            const finalBestScoreSpan = document.getElementById('finalBestScore');
            const playAgainBtn = document.getElementById('playAgainBtn');
            
            // 安全地從localStorage讀取最佳紀錄
            try {
                const stored = localStorage.getItem('guessBest');
                if (stored) {
                    const parsed = parseInt(stored, 10);
                    if (!isNaN(parsed) && parsed > 0) {
                        bestAttempts = parsed;
                    }
                }
            } catch (e) {
                console.warn('無法讀取localStorage:', e);
            }

            // 更新分數顯示
            function updateScoreDisplay() {
                currentScoreSpan.textContent = score;
                currentScoreSpan.setAttribute('aria-label', `當前分數：${score}`);
            }
            
            // 更新最佳紀錄顯示
            function updateBestDisplay() {
                if (bestAttempts) {
                    bestSpan.textContent = `🏆 最佳紀錄：${bestAttempts} 次`;
                    bestSpan.setAttribute('aria-label', `最佳紀錄：${bestAttempts}次`);
                    finalBestScoreSpan.textContent = `${bestAttempts} 次`;
                } else {
                    bestSpan.textContent = `🏆 最佳紀錄：--`;
                    bestSpan.setAttribute('aria-label', '尚未有最佳紀錄');
                    finalBestScoreSpan.textContent = '--';
                }
            }

            // 檢查並更新最佳紀錄
            function checkAndUpdateBest() {
                if (bestAttempts === null || attempts < bestAttempts) {
                    bestAttempts = attempts;
                    try {
                        localStorage.setItem('guessBest', bestAttempts.toString());
                    } catch (e) {
                        console.warn('無法保存到localStorage:', e);
                    }
                    updateBestDisplay();
                    messageDiv.textContent = `🎉 新紀錄！${bestAttempts} 次猜中！ 🎉`;
                }
            }

            // 開始遊戲
            function startGame() {
                startScreen.style.display = 'none';
                gameScreen.style.display = 'block';
                gameOverScreen.style.display = 'none';
                
                secretNumber = Math.floor(Math.random() * 100) + 1;
                attempts = 0;
                score = 0;
                guessInput.value = '';
                guessInput.disabled = false;
                messageDiv.textContent = '新遊戲開始！輸入 1~100';
                messageDiv.setAttribute('aria-label', '新遊戲開始，請輸入1到100之間的數字');
                attemptsSpan.textContent = '已猜次數：0';
                attemptsSpan.setAttribute('aria-label', '已猜次數：0');
                updateScoreDisplay();
                updateBestDisplay();
                guessInput.focus();
            }

            // 遊戲結束
            function gameOver() {
                gameScreen.style.display = 'none';
                gameOverScreen.style.display = 'flex';
                
                finalScoreSpan.textContent = score;
                finalAttemptsSpan.textContent = attempts;
                updateBestDisplay();
            }

            // 驗證輸入
            function validateInput(inputValue) {
                const trimmed = inputValue.trim();
                if (trimmed === '') {
                    return { valid: false, message: '⚠️ 請輸入數字' };
                }
                
                const val = parseInt(trimmed, 10);
                if (isNaN(val)) {
                    return { valid: false, message: '⚠️ 請輸入有效的數字' };
                }
                
                if (val < 1 || val > 100) {
                    return { valid: false, message: '⚠️ 請輸入 1~100 的數字' };
                }
                
                return { valid: true, value: val };
            }

            // 處理猜測
            function handleGuess() {
                const validation = validateInput(guessInput.value);
                if (!validation.valid) {
                    messageDiv.textContent = validation.message;
                    messageDiv.setAttribute('aria-label', validation.message);
                    guessInput.focus();
                    return;
                }
                
                const val = validation.value;
                
                // 檢查嘗試次數限制
                if (attempts >= MAX_ATTEMPTS - 1) {
                    messageDiv.textContent = `❌ 已達${MAX_ATTEMPTS}次嘗試限制！答案是 ${secretNumber}`;
                    messageDiv.setAttribute('aria-label', `已達${MAX_ATTEMPTS}次嘗試限制，答案是${secretNumber}`);
                    guessInput.disabled = true;
                    setTimeout(gameOver, 1500);
                    return;
                }
                
                attempts++;
                attemptsSpan.textContent = `已猜次數：${attempts}`;
                attemptsSpan.setAttribute('aria-label', `已猜次數：${attempts}`);

                if (val === secretNumber) {
                    // 計算分數：嘗試次數越少分數越高
                    score = Math.max(1, Math.floor(1000 / attempts));
                    updateScoreDisplay();
                    messageDiv.textContent = `🎉 猜中了！ 就是 ${secretNumber} ！ 獲得 ${score} 分`;
                    messageDiv.setAttribute('aria-label', `猜中了！答案是${secretNumber}，獲得${score}分`);
                    checkAndUpdateBest();
                    setTimeout(gameOver, 2000);
                } else if (val < secretNumber) {
                    messageDiv.textContent = '📉 太小了，再大一點';
                    messageDiv.setAttribute('aria-label', '太小了，請猜大一點的數字');
                } else {
                    messageDiv.textContent = '📈 太大了，再小一點';
                    messageDiv.setAttribute('aria-label', '太大了，請猜小一點的數字');
                }
                
                guessInput.value = '';
                guessInput.focus();
            }

            // 重置遊戲
            function resetGame() {
                secretNumber = Math.floor(Math.random() * 100) + 1;
                attempts = 0;
                score = 0;
                guessInput.value = '';
                guessInput.disabled = false;
                messageDiv.textContent = '新遊戲開始！輸入 1~100';
                messageDiv.setAttribute('aria-label', '新遊戲開始，請輸入1到100之間的數字');
                attemptsSpan.textContent = '已猜次數：0';
                attemptsSpan.setAttribute('aria-label', '已猜次數：0');
                updateScoreDisplay();
                guessInput.focus();
            }

            // 事件監聽器
            document.getElementById('guessBtn').addEventListener('click', handleGuess);

            document.getElementById('resetBtn').addEventListener('click', function() {
                resetGame();
            });

            guessInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleGuess();
                }
            });

            playAgainBtn.addEventListener('click', startGame);

            // 按任意鍵開始遊戲
            document.addEventListener('keydown', function(e) {
                if (startScreen.style.display !== 'none') {
                    startGame();
                } else if (gameOverScreen.style.display !== 'none') {
                    startGame();
                }
            });

            // 初始顯示
            updateBestDisplay();
            updateScoreDisplay();
            
            // 確保開始畫面顯示
            startScreen.style.display = 'flex';
            gameScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        })();
    </script>
</body>
</html>
