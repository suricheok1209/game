<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>貪吃蛇 · 我的遊戲館</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c0e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '微軟正黑體', 'Noto Sans TC', Roboto, sans-serif;
            padding: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #aaccff;
            font-size: 1.3rem;
            text-decoration: none;
            background: #1f2a33;
            padding: 8px 30px;
            border-radius: 40px;
            border: 1px solid #ffb347;
            transition: 0.2s;
            box-shadow: 0 0 10px #ff8c00;
        }
        .back-link:hover {
            background: #2f3c4a;
            color: white;
            transform: scale(1.05);
        }

        .game-container {
            background: #000000;
            border-radius: 32px;
            padding: 24px 28px 30px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.9), 0 0 0 2px #3a4048 inset;
            max-width: 500px;
            width: fit-content;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            padding: 0 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #ffa500, 0 0 25px #ff8c00;
            letter-spacing: 2px;
        }

        .score-board {
            background: #1f2a33;
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid #ffb347;
            box-shadow: 0 0 15px #ff8c00, inset 0 2px 5px #0b0e10;
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-board span {
            font-size: 2rem;
            line-height: 1;
            color: #fff3b0;
            text-shadow: 0 0 10px #ffb703;
        }

        .difficulty-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 18px;
        }

        .difficulty-btn {
            background: #1e262f;
            border: none;
            color: #8f9eb0;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 10px 35px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b0f13, 0 0 0 1px #3c4858;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .difficulty-btn:hover {
            background: #2a3542;
            color: #aaccff;
            transform: translateY(-1px);
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #ff8c00, #ffaa33);
            color: #000000;
            box-shadow: 0 0 30px #ffaa33, 0 5px 0 #b25e00, inset 0 2px 10px rgba(255, 255, 255, 0.3);
            border: 2px solid #ffc107;
            transform: translateY(-3px);
            font-weight: 900;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .difficulty-btn.active::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: radial-gradient(circle, rgba(255, 172, 51, 0.2) 0%, transparent 70%);
            z-index: -1;
            border-radius: 50px;
        }

        .difficulty-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 15px #ffaa33, 0 2px 0 #b25e00;
        }
        
        .difficulty-btn[data-level="low"] {
            border-left: 3px solid #4caf50;
        }
        
        .difficulty-btn[data-level="mid"] {
            border-left: 3px solid #ff9800;
        }
        
        .difficulty-btn[data-level="high"] {
            border-left: 3px solid #f44336;
        }

        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            background: black;
            box-shadow: 0 0 0 3px #4a5b6e, 0 15px 25px rgba(0,0,0,0.7);
            cursor: none;
            transition: box-shadow 0.3s ease;
        }
        
        @keyframes gameOverFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .game-over-overlay {
            animation: gameOverFadeIn 0.5s ease-out;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            color: #eef3f9;
            font-weight: 500;
            background: #131a22;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #3f5368;
            font-size: 1.1rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hint {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hint kbd {
            background: #1f2e3f;
            border-radius: 8px;
            padding: 5px 14px;
            color: #ffd966;
            font-weight: 700;
            border: 1px solid #6a7f9b;
            box-shadow: 0 2px 0 #0b0f13;
            font-size: 1rem;
        }

        .virtual-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        .dir-btn {
            background: #2a3f4e;
            border: none;
            font-size: 2rem;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            box-shadow: 0 5px 0 #0f1a22;
            transition: 0.05s linear;
        }
        .dir-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f1a22;
        }
        @media (min-width: 601px) {
            .virtual-buttons { display: none; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">⬅️ 返回主頁</a>
    <div class="game-container">
        <div class="header">
            <div class="title">🐍 貪吃蛇</div>
            <div class="score-board">
                🍎 <span id="scoreDisplay">0</span>
                <span style="font-size:1rem;">&nbsp;|&nbsp;</span>
                <span id="highScoreDisplay" style="font-size:1.4rem;">🏆 0</span>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 10px;">
            <div style="color: #aaccff; font-size: 1.2rem; font-weight: 600; letter-spacing: 1px;">選擇難度</div>
        </div>
        <div class="difficulty-row">
            <button class="difficulty-btn" data-level="low">低</button>
            <button class="difficulty-btn active" data-level="mid">中</button>
            <button class="difficulty-btn" data-level="high">高</button>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="info-panel">
            <div class="hint">
                <span><kbd>←↑↓→</kbd> 移動</span>
                <span><kbd>空格</kbd> 重生</span>
            </div>
        </div>
        <div class="virtual-buttons">
            <button class="dir-btn" data-dir="up">⬆️</button>
            <button class="dir-btn" data-dir="left">⬅️</button>
            <button class="dir-btn" data-dir="down">⬇️</button>
            <button class="dir-btn" data-dir="right">➡️</button>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const highScoreSpan = document.getElementById('highScoreDisplay');

            const GRID_SIZE = 20;
            const CELL_SIZE = 20; // 畫布固定 400x400

            const speedMap = {
                low: 250,
                mid: 160,
                high: 90
            };

            let currentDifficulty = 'mid';
            let currentInterval = speedMap.mid;

            let snake = [];
            let apple = { x: 8, y: 8 };
            let direction = [1, 0];
            let nextDirection = [1, 0];
            let score = 0;
            let gameActive = true;
            let win = false;
            let intervalId = null;

            let highScore = localStorage.getItem('snakeHighScore') ? parseInt(localStorage.getItem('snakeHighScore')) : 0;
            highScoreSpan.textContent = highScore;

            const difficultyBtns = document.querySelectorAll('.difficulty-btn');

            function updateScoreDisplay() {
                scoreSpan.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    highScoreSpan.textContent = highScore;
                }
            }

            function generateApple() {
                const snakeSet = new Set(snake.map(seg => `${seg[0]},${seg[1]}`));
                const freeCells = [];
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        if (!snakeSet.has(`${col},${row}`)) freeCells.push([col, row]);
                    }
                }
                if (freeCells.length === 0) return false;
                const randomIndex = Math.floor(Math.random() * freeCells.length);
                apple = { x: freeCells[randomIndex][0], y: freeCells[randomIndex][1] };
                return true;
            }

            function resetGame() {
                if (intervalId) clearInterval(intervalId);
                snake = [[10,10],[9,10],[8,10]];
                direction = [1,0];
                nextDirection = [1,0];
                score = 0;
                gameActive = true;
                win = false;
                updateScoreDisplay();
                const success = generateApple();
                if (!success) { gameActive = false; win = true; }
                draw();
                if (gameActive) intervalId = setInterval(move, currentInterval);
            }

            function move() {
                if (!gameActive) return;
                if (nextDirection) {
                    const isOpposite = (direction[0] === -nextDirection[0] && direction[1] === -nextDirection[1]);
                    if (!(snake.length > 1 && isOpposite)) direction = [nextDirection[0], nextDirection[1]];
                }
                const head = snake[0];
                const newHeadX = head[0] + direction[0];
                const newHeadY = head[1] + direction[1];
                if (newHeadX < 0 || newHeadX >= GRID_SIZE || newHeadY < 0 || newHeadY >= GRID_SIZE) {
                    gameActive = false; win = false; clearInterval(intervalId); intervalId = null;
                    // 添加撞牆視覺效果
                    canvas.style.boxShadow = '0 0 30px #ff0000, 0 0 0 3px #ff5555';
                    setTimeout(() => {
                        canvas.style.boxShadow = '0 0 0 3px #4a5b6e, 0 15px 25px rgba(0,0,0,0.7)';
                    }, 300);
                    draw();
                    return;
                }
                const ateApple = (newHeadX === apple.x && newHeadY === apple.y);
                let newSnake;
                if (ateApple) newSnake = [[newHeadX, newHeadY], ...snake];
                else newSnake = [[newHeadX, newHeadY], ...snake.slice(0, -1)];
                const headSeg = newSnake[0];
                const bodyWithoutHead = newSnake.slice(1);
                if (bodyWithoutHead.some(seg => seg[0] === headSeg[0] && seg[1] === headSeg[1])) {
                    gameActive = false; win = false; clearInterval(intervalId); intervalId = null; snake = newSnake; draw(); return;
                }
                snake = newSnake;
                if (ateApple) {
                    score++;
                    updateScoreDisplay();
                    if (!generateApple()) {
                        gameActive = false; win = true; clearInterval(intervalId); intervalId = null; draw(); return;
                    }
                }
                draw();
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // 網格
                ctx.strokeStyle = '#3f4d60';
                ctx.lineWidth = 0.8;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    const pos = i * CELL_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0); ctx.lineTo(pos, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos);
                    ctx.stroke();
                }
                // 蘋果
                if (apple) {
                    const ax = apple.x * CELL_SIZE, ay = apple.y * CELL_SIZE;
                    ctx.fillStyle = '#ff3a3a';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.ellipse(ax+10, ay+9, 7, 8, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.ellipse(ax+7, ay+5, 2, 2.5, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#a0ff4a';
                    ctx.beginPath();
                    ctx.ellipse(ax+12, ay-1, 4, 3, 0.3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                // 蛇
                for (let i=0; i<snake.length; i++) {
                    const [sx,sy] = snake[i];
                    const x = sx*CELL_SIZE, y = sy*CELL_SIZE;
                    if (i===0) {
                        ctx.fillStyle = '#c4ffb2';
                        ctx.shadowBlur = 18;
                    } else {
                        ctx.fillStyle = '#6ef06e';
                        ctx.shadowBlur = 12;
                    }
                    ctx.beginPath();
                    ctx.roundRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4, 6);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (i===0) {
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(x+6, y+7, 3, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x+14, y+7, 3, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(x+5, y+6, 1.2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x+13, y+6, 1.2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(x+4, y+5, 0.6, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x+12, y+5, 0.6, 0, 2*Math.PI);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = '#e2ffe2';
                        ctx.beginPath();
                        ctx.arc(x+6, y+6, 2, 0, 2*Math.PI);
                        ctx.globalAlpha = 0.7;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x+14, y+14, 2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                }
                // 結束畫面
                if (!gameActive) {
                    ctx.fillStyle = 'rgba(0,0,0,0.85)';
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                    
                    // 遊戲結束標題
                    ctx.font = 'bold 40px "Segoe UI", "微軟正黑體"';
                    ctx.fillStyle = win ? '#fadf8a' : '#ff5555';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = win ? '#ffaa00' : '#ff0000';
                    ctx.fillText(win ? '✨ 你贏了 ✨' : '💀 遊戲結束 💀', canvas.width/2, canvas.height/2-40);
                    ctx.shadowBlur = 0;
                    
                    // 分數顯示
                    ctx.font = '26px sans-serif';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(`分數: ${score}`, canvas.width/2, canvas.height/2+10);
                    
                    // 重新開始提示
                    ctx.font = '22px sans-serif';
                    ctx.fillStyle = '#aaccff';
                    ctx.fillText('空白鍵 重新開始', canvas.width/2, canvas.height/2+55);
                    
                    // 難度提示
                    ctx.font = '18px sans-serif';
                    ctx.fillStyle = '#cccccc';
                    ctx.fillText(`當前難度: ${currentDifficulty === 'low' ? '低' : currentDifficulty === 'mid' ? '中' : '高'}`, canvas.width/2, canvas.height/2+90);
                    
                    ctx.textAlign = 'left';
                }
            }

            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
                    if (w<2*r) r=w/2; if (h<2*r) r=h/2;
                    this.moveTo(x+r,y);
                    this.lineTo(x+w-r,y);
                    this.quadraticCurveTo(x+w,y,x+w,y+r);
                    this.lineTo(x+w,y+h-r);
                    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
                    this.lineTo(x+r,y+h);
                    this.quadraticCurveTo(x,y+h,x,y+h-r);
                    this.lineTo(x,y+r);
                    this.quadraticCurveTo(x,y,x+r,y);
                    this.closePath();
                    return this;
                };
            }

            difficultyBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    difficultyBtns.forEach(b=>b.classList.remove('active'));
                    this.classList.add('active');
                    currentDifficulty = this.dataset.level;
                    currentInterval = speedMap[currentDifficulty];
                    if (gameActive) resetGame();
                    else draw();
                });
            });

            function handleKey(e) {
                const key = e.key;
                if (key.startsWith('Arrow') || key === ' ') e.preventDefault();
                if (key === ' ') { resetGame(); return; }
                if (!gameActive) return;
                let nd = null;
                if (key === 'ArrowUp') nd = [0,-1];
                else if (key === 'ArrowDown') nd = [0,1];
                else if (key === 'ArrowLeft') nd = [-1,0];
                else if (key === 'ArrowRight') nd = [1,0];
                if (nd) nextDirection = nd;
            }
            window.addEventListener('keydown', handleKey);
            window.addEventListener('keyup', e => { if (e.key.startsWith('Arrow')||e.key===' ') e.preventDefault(); });

            // 觸控方向按鈕
            document.querySelectorAll('.dir-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (!gameActive) return;
                    const dir = btn.dataset.dir;
                    let nd = null;
                    if (dir === 'up') nd = [0,-1];
                    else if (dir === 'down') nd = [0,1];
                    else if (dir === 'left') nd = [-1,0];
                    else if (dir === 'right') nd = [1,0];
                    if (nd) nextDirection = nd;
                });
            });

            canvas.setAttribute('tabindex','0');
            canvas.addEventListener('click',()=>canvas.focus());
            resetGame();
        })();
    </script>
</body>
</html>
