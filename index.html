<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪吃蛇 · 黑夜魅影</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c0e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '微軟正黑體', 'Noto Sans TC', Roboto, sans-serif;
        }

        .game-container {
            background: #000000;
            border-radius: 32px;
            padding: 24px 28px 30px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.9), 0 0 0 2px #3a4048 inset;
            max-width: 500px;
            width: fit-content;
        }

        /* 標題列：左側標題 + 右側計分板 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #ffa500, 0 0 25px #ff8c00;
            letter-spacing: 2px;
        }

        .score-board {
            background: #1f2a33;
            padding: 8px 24px;
            border-radius: 60px;
            border: 1px solid #ffb347;
            box-shadow: 0 0 15px #ff8c00, inset 0 2px 5px #0b0e10;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-board span {
            font-size: 2.5rem;
            line-height: 1;
            color: #fff3b0;
            text-shadow: 0 0 10px #ffb703;
        }

        /* 難度按鈕群 */
        .difficulty-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 18px;
        }

        .difficulty-btn {
            background: #1e262f;
            border: none;
            color: #8f9eb0;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 8px 30px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b0f13, 0 0 0 1px #3c4858;
            transition: all 0.1s ease;
            font-family: inherit;
            letter-spacing: 1px;
        }

        .difficulty-btn.active {
            background: #ff8c00;
            color: #000000;
            box-shadow: 0 0 25px #ffaa33, 0 5px 0 #b25e00;
            border: 1px solid #ffc107;
            transform: translateY(-2px);
        }

        .difficulty-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 20px #ffaa33, 0 2px 0 #b25e00;
        }

        canvas {
            display: block;
            margin: 0 auto;
            width: 400px;
            height: 400px;
            border-radius: 24px;
            background: black;
            box-shadow: 0 0 0 3px #4a5b6e, 0 15px 25px rgba(0,0,0,0.7);
            cursor: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            color: #eef3f9;
            font-weight: 500;
            background: #131a22;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #3f5368;
            font-size: 1.1rem;
        }

        .hint {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .hint kbd {
            background: #1f2e3f;
            border-radius: 8px;
            padding: 5px 14px;
            color: #ffd966;
            font-weight: 700;
            border: 1px solid #6a7f9b;
            box-shadow: 0 2px 0 #0b0f13;
            font-size: 1rem;
        }

        .hint span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 小提示字體加粗、飽和 */
        .hint span:last-child kbd {
            background: #2a3f36;
            color: #b6ffb6;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 標題列：貪吃蛇 + 加大計分板 -->
    <div class="header">
        <div class="title">🐍 貪吃蛇</div>
        <div class="score-board">
            🍎 <span id="scoreDisplay">0</span>
        </div>
    </div>

    <!-- 難度三選一 (低中高) 繁體 -->
    <div class="difficulty-row">
        <button class="difficulty-btn" data-level="low">低</button>
        <button class="difficulty-btn active" data-level="mid">中</button>
        <button class="difficulty-btn" data-level="high">高</button>
    </div>

    <!-- 遊戲畫布 (400x400) -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- 下方操作提示 (繁體) -->
    <div class="info-panel">
        <div class="hint">
            <span><kbd>←↑↓→</kbd> 移動</span>
            <span><kbd>空格</kbd> 重生</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 設定參數 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        const GRID_SIZE = 20;            // 20x20 網格
        const CELL_SIZE = 20;             // 像素

        // 難度速度對照 (低/中/高) 單位: ms
        const speedMap = {
            low: 250,
            mid: 160,
            high: 90
        };

        // 當前難度 & 移動間隔 (預設為中)
        let currentDifficulty = 'mid';
        let currentInterval = speedMap.mid;

        // ---------- 遊戲狀態變數 ----------
        let snake = [];                   // 座標陣列 [x, y] 頭部索引0
        let apple = { x: 8, y: 8 };
        let direction = [1, 0];            // 目前方向 [dx, dy] (右)
        let nextDirection = [1, 0];
        let score = 0;
        let gameActive = true;
        let win = false;
        let intervalId = null;

        // 取得難度按鈕元素
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        // ---------- 輔助函式 ----------
        function updateScoreDisplay() {
            scoreSpan.textContent = score;
        }

        // 生成新蘋果 (避開蛇身)
        function generateApple() {
            const snakeSet = new Set(snake.map(seg => `${seg[0]},${seg[1]}`));
            const freeCells = [];

            for (let row = 0; row < GRID_SIZE; row++) {
                for (let col = 0; col < GRID_SIZE; col++) {
                    if (!snakeSet.has(`${col},${row}`)) {
                        freeCells.push([col, row]);
                    }
                }
            }

            if (freeCells.length === 0) return false;

            const randomIndex = Math.floor(Math.random() * freeCells.length);
            apple = { x: freeCells[randomIndex][0], y: freeCells[randomIndex][1] };
            return true;
        }

        // 重置遊戲 (開始新對局)
        function resetGame() {
            // 停止計時器
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }

            // 初始蛇: 長度3 水平向右
            snake = [
                [10, 10],
                [9, 10],
                [8, 10]
            ];
            direction = [1, 0];
            nextDirection = [1, 0];
            score = 0;
            gameActive = true;
            win = false;

            // 生成第一個蘋果
            const success = generateApple();
            if (!success) {
                gameActive = false;
                win = true;
            }

            updateScoreDisplay();
            draw();

            // 若遊戲活躍，以目前難度速度啟動定時器
            if (gameActive) {
                intervalId = setInterval(move, currentInterval);
            }
        }

        // ---------- 核心移動邏輯 (與原版相同，但使用 currentInterval) ----------
        function move() {
            if (!gameActive) return;

            // 方向合法性檢查 (不可反向)
            if (nextDirection) {
                const isOpposite = (direction[0] === -nextDirection[0] && direction[1] === -nextDirection[1]);
                if (!(snake.length > 1 && isOpposite)) {
                    direction = [nextDirection[0], nextDirection[1]];
                }
            }

            const head = snake[0];
            const newHeadX = head[0] + direction[0];
            const newHeadY = head[1] + direction[1];

            // 牆壁碰撞
            if (newHeadX < 0 || newHeadX >= GRID_SIZE || newHeadY < 0 || newHeadY >= GRID_SIZE) {
                gameActive = false;
                win = false;
                clearInterval(intervalId);
                intervalId = null;
                draw();
                return;
            }

            const ateApple = (newHeadX === apple.x && newHeadY === apple.y);

            let newSnake;
            if (ateApple) {
                newSnake = [[newHeadX, newHeadY], ...snake];
            } else {
                newSnake = [[newHeadX, newHeadY], ...snake.slice(0, -1)];
            }

            // 自身碰撞
            const headSegment = newSnake[0];
            const bodyWithoutHead = newSnake.slice(1);
            const collidesWithSelf = bodyWithoutHead.some(seg => seg[0] === headSegment[0] && seg[1] === headSegment[1]);

            if (collidesWithSelf) {
                gameActive = false;
                win = false;
                clearInterval(intervalId);
                intervalId = null;
                snake = newSnake;
                draw();
                return;
            }

            snake = newSnake;

            if (ateApple) {
                score++;
                updateScoreDisplay();

                const appleGenerated = generateApple();
                if (!appleGenerated) {
                    gameActive = false;
                    win = true;
                    clearInterval(intervalId);
                    intervalId = null;
                    draw();
                    return;
                }
            }

            draw();
        }

        // ---------- 繪製函式 (高飽和度 + 精緻小蛇) ----------
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 純黑背景
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 網格線 (更亮、高飽和)
            ctx.strokeStyle = '#3f4d60';   // 亮灰藍
            ctx.lineWidth = 0.8;
            for (let i = 0; i <= GRID_SIZE; i++) {
                const pos = i * CELL_SIZE;
                ctx.beginPath();
                ctx.strokeStyle = '#4e617a';
                ctx.lineWidth = 0.6;
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }

            // 3. 繪製蘋果 (高飽和紅 + 光澤)
            if (apple) {
                const ax = apple.x * CELL_SIZE;
                const ay = apple.y * CELL_SIZE;

                // 蘋果主體 (鮮紅色)
                ctx.fillStyle = '#ff3a3a';
                ctx.shadowColor = '#ff8888';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.ellipse(ax + 10, ay + 9, 7, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // 蘋果高光
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(ax + 7, ay + 5, 2, 2.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // 葉子 (螢光綠)
                ctx.fillStyle = '#a0ff4a';
                ctx.shadowColor = '#b3ff99';
                ctx.beginPath();
                ctx.ellipse(ax + 12, ay - 1, 4, 3, 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
            }

            // 4. 繪製蛇 (高飽和綠 + 鱗片/眼睛)
            if (snake.length > 0) {
                for (let i = 0; i < snake.length; i++) {
                    const [sx, sy] = snake[i];
                    const x = sx * CELL_SIZE;
                    const y = sy * CELL_SIZE;

                    // ---- 蛇身飽和綠 (頭部更亮) ----
                    if (i === 0) {
                        ctx.fillStyle = '#c4ffb2';   // 亮螢光綠頭部
                        ctx.shadowColor = '#b0ffb0';
                        ctx.shadowBlur = 18;
                    } else {
                        ctx.fillStyle = '#6ef06e';     // 高飽和身體
                        ctx.shadowColor = '#8cff8c';
                        ctx.shadowBlur = 12;
                    }

                    // 圓角身體 (稍微縮小一點讓細節可見)
                    ctx.beginPath();
                    ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, 6);
                    ctx.fill();

                    // ----- 精緻細節 (關閉陰影避免擴散) -----
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';

                    if (i === 0) {
                        // 蛇頭大眼睛 (白色底 + 黑瞳孔)
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(x + 6, y + 7, 3, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 14, y + 7, 3, 0, 2 * Math.PI);
                        ctx.fill();

                        ctx.fillStyle = '#000000';
                        ctx.beginPath();
                        ctx.arc(x + 5, y + 6, 1.2, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 13, y + 6, 1.2, 0, 2 * Math.PI);
                        ctx.fill();

                        // 眼睛小白點 (反光)
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(x + 4, y + 5, 0.6, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 12, y + 5, 0.6, 0, 2 * Math.PI);
                        ctx.fill();
                    } else {
                        // 身體鱗片光澤 (兩個小亮點)
                        ctx.fillStyle = '#e2ffe2';
                        ctx.beginPath();
                        ctx.arc(x + 6, y + 6, 2, 0, 2 * Math.PI);
                        ctx.globalAlpha = 0.7;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 14, y + 14, 2, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    }
                }
                // 恢復陰設為無
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.globalAlpha = 1.0;
            }

            // ---- 5. 畫布上直接顯示分數 (已經有計分板，但保留也可，此處省略避免重複，但可保留小圖示，可移除----
            // 但為了畫面上沒有多餘文字，註解掉原有分數繪製 (避免重疊)
            // 原本有 ctx.fillText 顯示分數，現在不需要，因為計分板已強化

            // ---- 6. 遊戲結束遮罩 (繁體訊息) ----
            if (!gameActive) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = 'bold 32px "Segoe UI", "微軟正黑體", "Noto Sans TC", sans-serif';
                ctx.fillStyle = win ? '#fadf8a' : '#ff8888';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 18;
                ctx.textAlign = 'center';
                if (win) {
                    ctx.fillText('✨ 你贏了 ✨', canvas.width / 2, canvas.height / 2 - 25);
                } else {
                    ctx.fillText('💀 遊戲結束 💀', canvas.width / 2, canvas.height / 2 - 25);
                }

                ctx.font = '22px "Segoe UI", "微軟正黑體", monospace';
                ctx.fillStyle = '#dddddd';
                ctx.fillText('空白鍵 重新開始', canvas.width / 2, canvas.height / 2 + 35);
                ctx.textAlign = 'left';
                ctx.shadowBlur = 0;
            }

            // 輔助 roundRect (若未定義)
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (w < 2 * r) r = w / 2;
                    if (h < 2 * r) r = h / 2;
                    this.moveTo(x + r, y);
                    this.lineTo(x + w - r, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r);
                    this.lineTo(x + w, y + h - r);
                    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    this.lineTo(x + r, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r);
                    this.lineTo(x, y + r);
                    this.quadraticCurveTo(x, y, x + r, y);
                    this.closePath();
                    return this;
                };
            }
        }

        // ---------- 難度按鈕點擊處理 (繁體) ----------
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // 移除所有 active
                difficultyBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                // 取得難度等級
                const level = this.dataset.level; // 'low', 'mid', 'high'
                currentDifficulty = level;
                currentInterval = speedMap[level];

                // 如果遊戲正在進行中，自動重新開始 (套用新難度)
                if (gameActive) {
                    resetGame();  // reset 內部會用新的 currentInterval 啟動計時器
                } else {
                    // 遊戲已結束，只改變速度，之後按空格會以新速度開始
                    // 但為了讓玩家感受到速度已切換，可簡單重繪 (顯示不變)
                    draw();
                }
            });
        });

        // ---------- 鍵盤事件 (方向 + 空格) ----------
        function handleKeyDown(e) {
            const key = e.key;
            if (key.startsWith('Arrow') || key === ' ') {
                e.preventDefault();
            }

            // 空白鍵：重置遊戲 (無論狀態)
            if (key === ' ') {
                resetGame();
                return;
            }

            if (!gameActive) return; // 遊戲結束不處理方向

            let newDir = null;
            if (key === 'ArrowUp') newDir = [0, -1];
            else if (key === 'ArrowDown') newDir = [0, 1];
            else if (key === 'ArrowLeft') newDir = [-1, 0];
            else if (key === 'ArrowRight') newDir = [1, 0];
            else return;

            nextDirection = newDir;
        }

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', (e) => {
            if (e.key.startsWith('Arrow') || e.key === ' ') e.preventDefault();
        });

        // 畫布聚焦（方便鍵盤）
        canvas.setAttribute('tabindex', '0');
        canvas.addEventListener('click', () => canvas.focus());

        // 啟動遊戲 (中難度預設)
        resetGame();
    })();
</script>
</body>
</html>
