<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 我的遊戲館</title>
    <style>
        body {
            font-family: 'Segoe UI', '微軟正黑體', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 40px;
            margin: 0;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00a8ff;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 900px;
            margin: 40px auto;
        }
        .game-card {
            background: #2d2d44;
            padding: 30px 40px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            box-shadow: 0 8px 0 #0f0f1f;
            min-width: 150px;
        }
        .game-card:hover {
            background: #3d3d5c;
            transform: translateY(-5px);
            box-shadow: 0 13px 0 #0f0f1f;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .game-card div:last-child {
            font-size: 1.8rem;
            font-weight: bold;
        }
        footer {
            margin-top: 50px;
            color: #7a7a9e;
        }
    </style>
</head>
<body>
    <h1>🎮 我的遊戲館</h1>
    <div class="games">
        <a href="game1.html" class="game-card">
            <div class="icon">🔢</div>
            <div>猜數字</div>
        </a>
        <a href="game2.html" class="game-card">
            <div class="icon">🧠</div>
            <div>記憶配對</div>
        </a>
        <a href="game3.html" class="game-card">
            <div class="icon">🐍</div>
            <div>貪吃蛇</div>
        </a>
    </div>
    <footer>⬅️ 點擊卡片進入遊戲</footer>
</body>
</html>
