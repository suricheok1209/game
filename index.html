<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮 我的遊戲館 · 經典再現</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', '微軟正黑體', Arial, sans-serif;
            background: linear-gradient(145deg, #14182b 0%, #1a1a2e 100%);
            color: white;
            text-align: center;
            padding: 0 20px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-wrapper {
            max-width: 1200px;
            width: 100%;
        }

        .hero {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 40px 30px;
            margin: 30px 0 40px;
            border: 2px solid #4a6fa5;
            box-shadow: 0 15px 0 #0a0f1a, 0 0 30px #2a4a7a;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #ffa500;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 1.5rem;
            color: #b8d0ff;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 50px 0;
        }

        .feature-card {
            background: #1f2a41;
            padding: 25px 20px;
            border-radius: 30px;
            flex: 1 1 200px;
            max-width: 260px;
            box-shadow: 0 10px 0 #0f1422, 0 0 0 2px #3e5770;
            transition: transform 0.2s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffb347;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 1.1rem;
            color: #b0c6e0;
        }

        .section-title {
            font-size: 2.8rem;
            margin: 60px 0 30px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80%;
            height: 4px;
            background: #ffb347;
            margin: 10px auto 0;
            border-radius: 4px;
            box-shadow: 0 0 15px #ffa500;
        }

        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 40px auto;
        }

        .game-card {
            background: #2d2d44;
            padding: 30px 30px 40px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            box-shadow: 0 12px 0 #0f0f1f, 0 0 0 2px #4f6b8a;
            min-width: 240px;
            flex: 1 1 260px;
            max-width: 300px;
        }

        .game-card:hover {
            background: #3d3d5c;
            transform: translateY(-8px);
            box-shadow: 0 18px 0 #0f0f1f, 0 0 20px #6a8bbf;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffd966;
        }

        .game-desc {
            font-size: 1.2rem;
            color: #b0c4de;
            margin-bottom: 15px;
        }

        .play-badge {
            background: #4a6fa5;
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 600;
            box-shadow: 0 5px 0 #1e2f47;
        }

        .featured-section {
            background: #1a2335;
            border-radius: 50px;
            padding: 30px;
            margin: 50px 0;
            border: 2px solid #ffb347;
        }

        .featured-title {
            font-size: 2.2rem;
            color: #ffd966;
            margin-bottom: 25px;
        }

        .mini-games {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .mini-item {
            background: #252f44;
            border-radius: 30px;
            padding: 20px;
            width: 160px;
            box-shadow: 0 8px 0 #121827;
        }

        .mini-icon {
            font-size: 3rem;
        }

        .mini-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffb347;
        }

        footer {
            margin-top: 70px;
            padding: 30px;
            background: #0e1322;
            border-radius: 60px 60px 0 0;
            width: 100%;
            border-top: 2px solid #4a6fa5;
            color: #a1b5d9;
            font-size: 1.2rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px 0 10px;
            font-size: 2rem;
        }

        .social-links a {
            color: #ffb347;
            text-decoration: none;
            transition: 0.2s;
        }

        .social-links a:hover {
            color: #ffd966;
            transform: scale(1.2);
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.8rem; }
            .section-title { font-size: 2.2rem; }
            .game-card { min-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="hero" role="banner">
            <h1>🎮 我的遊戲館</h1>
            <p>經典懷舊・免費暢玩・持續更新<br>點擊卡片立即開始你的遊戲之旅</p>
        </div>

        <div class="features" role="region" aria-label="特色功能">
            <div class="feature-card" role="article">
                <div class="feature-icon" aria-hidden="true">🕹️</div>
                <div class="feature-title">經典懷舊</div>
                <div class="feature-desc">猜數字、記憶配對、貪吃蛇，重溫不敗經典</div>
            </div>
            <div class="feature-card" role="article">
                <div class="feature-icon" aria-hidden="true">🎯</div>
                <div class="feature-title">免費暢玩</div>
                <div class="feature-desc">全部遊戲無需付費，即開即玩</div>
            </div>
            <div class="feature-card" role="article">
                <div class="feature-icon" aria-hidden="true">🚀</div>
                <div class="feature-title">持續更新</div>
                <div class="feature-desc">更多趣味遊戲陸續上架，敬請期待</div>
            </div>
        </div>

        <div class="section-title" role="heading" aria-level="2">🔥 精選遊戲 🔥</div>

        <div class="games-grid" role="navigation" aria-label="遊戲選擇">
            <a href="game1.html" class="game-card" role="link" aria-label="猜數字遊戲：1到100猜中神秘數字，挑戰最少步數">
                <div class="icon" aria-hidden="true">🔢</div>
                <div class="game-title">猜數字</div>
                <div class="game-desc">1~100 猜中神秘數字，挑戰最少步數</div>
                <span class="play-badge">▶ 開始挑戰</span>
            </a>
            <a href="game2.html" class="game-card" role="link" aria-label="記憶配對遊戲：翻牌配對，考驗你的記憶與策略">
                <div class="icon" aria-hidden="true">🧠</div>
                <div class="game-title">記憶配對</div>
                <div class="game-desc">翻牌配對，考驗你的記憶與策略</div>
                <span class="play-badge">▶ 開始挑戰</span>
            </a>
            <a href="game3.html" class="game-card" role="link" aria-label="貪吃蛇遊戲：經典貪吃蛇，三級難度，挑戰最高分">
                <div class="icon" aria-hidden="true">🐍</div>
                <div class="game-title">貪吃蛇</div>
                <div class="game-desc">經典貪吃蛇，三級難度，挑戰最高分</div>
                <span class="play-badge">▶ 開始挑戰</span>
            </a>
        </div>

        <div class="featured-section" role="region" aria-label="熱門遊戲">
            <div class="featured-title">⭐ 最多人玩 ⭐</div>
            <div class="mini-games">
                <div class="mini-item" role="listitem">
                    <div class="mini-icon" aria-hidden="true">🐍</div>
                    <div class="mini-name">貪吃蛇</div>
                </div>
                <div class="mini-item" role="listitem">
                    <div class="mini-icon" aria-hidden="true">🧠</div>
                    <div class="mini-name">記憶配對</div>
                </div>
                <div class="mini-item" role="listitem">
                    <div class="mini-icon" aria-hidden="true">🔢</div>
                    <div class="mini-name">猜數字</div>
                </div>
            </div>
        </div>

        <footer role="contentinfo">
            <div>© 2026 我的遊戲館 · 所有遊戲免費提供</div>
            <div class="social-links" aria-label="社交媒體連結">
                <a href="#" target="_blank" aria-label="Facebook">📘</a>
                <a href="#" target="_blank" aria-label="Twitter">🐦</a>
                <a href="#" target="_blank" aria-label="YouTube">📺</a>
                <a href="#" target="_blank" aria-label="討論區">💬</a>
            </div>
            <div style="font-size: 1rem; margin-top: 15px;">懷舊永不退流行 · 開心就在遊戲館</div>
        </footer>
    </div>
</body>
</html>
