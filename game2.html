<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>記憶配對 · 我的遊戲館</title>
    <style>
        body {
            font-family: 'Segoe UI', '微軟正黑體', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 30px;
            margin: 0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            color: #aaccff;
            font-size: 1.3rem;
            text-decoration: none;
            background: #2d2d44;
            padding: 8px 25px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: #3d3d5c;
            color: white;
        }
        .game-container {
            background: #23233a;
            max-width: 550px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 50px;
            box-shadow: 0 15px 0 #0d0d1a;
        }
        h2 {
            font-size: 3rem;
            margin: 0 0 10px;
            color: #ffb347;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #0f1420;
            border-radius: 60px;
            padding: 12px 25px;
            margin: 15px 0 25px;
            border: 2px solid #ffb347;
            font-size: 1.4rem;
        }
        .pairs-matched, .steps {
            background: #2a2a44;
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffd966;
            font-weight: bold;
        }
        .message {
            font-size: 1.8rem;
            color: #b8d0ff;
            margin-top: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
        }
        .card {
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #3e4b5e, #2a3440);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #151e2a, 0 0 0 2px #5f7a9a;
            transition: 0.15s;
            color: white;
        }
        .card.flipped {
            background: #f5e56b;
            background: linear-gradient(145deg, #f3d779, #e6b422);
            box-shadow: 0 8px 0 #b2741e, 0 0 0 3px #ffe484;
            color: #1a1a2e;
            transform: scale(1.02);
        }
        .card.matched {
            background: #4caf9e;
            background: linear-gradient(145deg, #6ad4b3, #2a9d8f);
            box-shadow: 0 8px 0 #1e6b5e, 0 0 0 3px #a0f0d0;
            color: #ffffff;
            cursor: default;
            opacity: 0.8;
            transform: scale(0.98);
        }
        .card:active:not(.flipped):not(.matched) {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #151e2a;
        }
        .reset-btn {
            background: #7a5d3c;
            border: none;
            color: white;
            font-size: 2rem;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #4d3b25;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 15px;
        }
        .reset-btn:hover {
            background: #9b784f;
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #4d3b25;
        }
        .footer-note {
            margin-top: 20px;
            color: #7a7a9e;
            font-size: 1.2rem;
        }
        @media (max-width: 500px) {
            .card { font-size: 2rem; }
            .stats { font-size: 1rem; flex-direction: column; gap: 8px; align-items: center; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link" aria-label="返回遊戲主頁">⬅️ 返回主頁</a>
    <div class="game-container" role="main" aria-labelledby="game-title">
        <h2 id="game-title">🧠 記憶配對</h2>
        <div class="stats" aria-live="polite" aria-atomic="false">
            <span>✅ 已配對：<span class="pairs-matched" id="pairsCount" aria-label="已配對對數">0 / 8</span></span>
            <span>🔢 步數：<span class="steps" id="stepsCount" aria-label="當前步數">0</span></span>
        </div>
        <div class="grid" id="memoryGrid" role="grid" aria-label="記憶配對遊戲板" aria-describedby="game-instructions"></div>
        <div class="message" id="winMessage" role="alert" aria-live="assertive"></div>
        <button class="reset-btn" id="resetGame" aria-label="開始新一局遊戲">🔄 新一局</button>
        <div class="footer-note" id="game-instructions">點擊卡片翻牌，配對所有表情符號</div>
    </div>

    <script>
        (function() {
            const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
            
            let cards = [];
            let flippedIndexes = [];
            let matchedPairs = 0;
            let steps = 0;
            let lockBoard = false;
            let timeoutHandle = null;
            let bestSteps = null;
            let cardElements = [];

            // 安全地讀取最佳紀錄
            try {
                const stored = localStorage.getItem('memoryBest');
                if (stored) {
                    const parsed = parseInt(stored, 10);
                    if (!isNaN(parsed) && parsed >= 0) {
                        bestSteps = parsed;
                    }
                }
            } catch (e) {
                console.warn('無法讀取localStorage:', e);
            }

            const gridElement = document.getElementById('memoryGrid');
            const pairsSpan = document.getElementById('pairsCount');
            const stepsSpan = document.getElementById('stepsCount');
            const winMessageDiv = document.getElementById('winMessage');

            function updateStats() {
                pairsSpan.textContent = `${matchedPairs} / 8`;
                pairsSpan.setAttribute('aria-label', `已配對${matchedPairs}對，共8對`);
                stepsSpan.textContent = steps;
                stepsSpan.setAttribute('aria-label', `當前步數：${steps}`);
            }

            function checkWin() {
                if (matchedPairs === 8) {
                    let msg = `🎉 恭喜完成！ 步數：${steps}`;
                    let ariaMsg = `恭喜完成遊戲，步數：${steps}`;
                    
                    if (bestSteps === null || steps < bestSteps) {
                        bestSteps = steps;
                        try {
                            localStorage.setItem('memoryBest', bestSteps.toString());
                        } catch (e) {
                            console.warn('無法保存到localStorage:', e);
                        }
                        msg += ` 🏆 新紀錄！最佳步數 ${bestSteps}`;
                        ariaMsg += `，新紀錄！最佳步數${bestSteps}`;
                    } else {
                        msg += `  最佳紀錄：${bestSteps} 步`;
                        ariaMsg += `，最佳紀錄：${bestSteps}步`;
                    }
                    winMessageDiv.textContent = msg;
                    winMessageDiv.setAttribute('aria-label', ariaMsg);
                } else {
                    winMessageDiv.textContent = '';
                    winMessageDiv.removeAttribute('aria-label');
                }
            }

            function initCards() {
                let deck = [...emojis, ...emojis];
                // Fisher-Yates shuffle
                for (let i = deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [deck[i], deck[j]] = [deck[j], deck[i]];
                }
                cards = deck.map((emoji, index) => ({
                    id: index,
                    emoji: emoji,
                    matched: false,
                    flipped: false
                }));
                flippedIndexes = [];
                matchedPairs = 0;
                steps = 0;
                lockBoard = false;
                if (timeoutHandle) {
                    clearTimeout(timeoutHandle);
                    timeoutHandle = null;
                }
                updateStats();
                winMessageDiv.textContent = '';
                winMessageDiv.removeAttribute('aria-label');
                cardElements = [];
            }

            function createCardElement(card, index) {
                const cardDiv = document.createElement('button');
                cardDiv.className = 'card';
                cardDiv.setAttribute('type', 'button');
                cardDiv.setAttribute('aria-label', `卡片${index + 1}，未翻開`);
                cardDiv.dataset.index = index;
                
                if (card.matched) {
                    cardDiv.classList.add('matched');
                    cardDiv.textContent = card.emoji;
                    cardDiv.setAttribute('aria-label', `卡片${index + 1}，已配對，圖案：${card.emoji}`);
                    cardDiv.disabled = true;
                } else if (card.flipped) {
                    cardDiv.classList.add('flipped');
                    cardDiv.textContent = card.emoji;
                    cardDiv.setAttribute('aria-label', `卡片${index + 1}，已翻開，圖案：${card.emoji}`);
                } else {
                    cardDiv.textContent = '?';
                    cardDiv.setAttribute('aria-label', `卡片${index + 1}，未翻開`);
                }
                
                return cardDiv;
            }

            function updateCardElement(cardElement, card, index) {
                // 移除所有狀態類別
                cardElement.classList.remove('flipped', 'matched');
                
                if (card.matched) {
                    cardElement.classList.add('matched');
                    cardElement.textContent = card.emoji;
                    cardElement.setAttribute('aria-label', `卡片${index + 1}，已配對，圖案：${card.emoji}`);
                    cardElement.disabled = true;
                } else if (card.flipped) {
                    cardElement.classList.add('flipped');
                    cardElement.textContent = card.emoji;
                    cardElement.setAttribute('aria-label', `卡片${index + 1}，已翻開，圖案：${card.emoji}`);
                    cardElement.disabled = false;
                } else {
                    cardElement.textContent = '?';
                    cardElement.setAttribute('aria-label', `卡片${index + 1}，未翻開`);
                    cardElement.disabled = false;
                }
            }

            function renderBoard(forceRender = false) {
                if (forceRender || cardElements.length === 0) {
                    // 初次渲染或強制重新渲染
                    gridElement.innerHTML = '';
                    cardElements = [];
                    
                    cards.forEach((card, index) => {
                        const cardElement = createCardElement(card, index);
                        cardElement.addEventListener('click', () => onCardClick(index));
                        gridElement.appendChild(cardElement);
                        cardElements[index] = cardElement;
                    });
                } else {
                    // 只更新改變的卡片
                    flippedIndexes.forEach(index => {
                        if (cardElements[index]) {
                            updateCardElement(cardElements[index], cards[index], index);
                        }
                    });
                    
                    // 如果配對了，更新配對的卡片
                    cards.forEach((card, index) => {
                        if (card.matched && cardElements[index]) {
                            updateCardElement(cardElements[index], card, index);
                        }
                    });
                }
            }

            function onCardClick(index) {
                if (lockBoard) return;
                if (cards[index].matched) return;
                if (cards[index].flipped) return;
                if (flippedIndexes.length === 2) return;

                cards[index].flipped = true;
                flippedIndexes.push(index);
                
                // 只更新被點擊的卡片
                if (cardElements[index]) {
                    updateCardElement(cardElements[index], cards[index], index);
                }

                if (flippedIndexes.length === 2) {
                    steps++;
                    updateStats();
                    checkMatch();
                }
            }

            function checkMatch() {
                const [idx1, idx2] = flippedIndexes;
                const card1 = cards[idx1];
                const card2 = cards[idx2];

                if (card1.emoji === card2.emoji) {
                    card1.matched = true;
                    card2.matched = true;
                    matchedPairs++;
                    updateStats();
                    flippedIndexes = [];
                    
                    // 更新配對的卡片
                    [idx1, idx2].forEach(idx => {
                        if (cardElements[idx]) {
                            updateCardElement(cardElements[idx], cards[idx], idx);
                        }
                    });
                    
                    checkWin();
                } else {
                    lockBoard = true;
                    timeoutHandle = setTimeout(() => {
                        card1.flipped = false;
                        card2.flipped = false;
                        flippedIndexes = [];
                        lockBoard = false;
                        
                        // 更新翻回的卡片
                        [idx1, idx2].forEach(idx => {
                            if (cardElements[idx]) {
                                updateCardElement(cardElements[idx], cards[idx], idx);
                            }
                        });
                        
                        timeoutHandle = null;
                    }, 800);
                }
            }

            function resetGame() {
                if (timeoutHandle) {
                    clearTimeout(timeoutHandle);
                    timeoutHandle = null;
                }
                initCards();
                renderBoard(true);
            }

            // 添加鍵盤導航支援
            function handleKeyDown(e) {
                if (e.key === 'Escape') {
                    resetGame();
                } else if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    resetGame();
                }
            }

            document.addEventListener('keydown', handleKeyDown);
            document.getElementById('resetGame').addEventListener('click', resetGame);

            initCards();
            renderBoard(true);
        })();
    </script>
</body>
</html>
