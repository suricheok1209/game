<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>記憶配對 · 我的遊戲館</title>
    <style>
        body {
            font-family: 'Segoe UI', '微軟正黑體', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 30px;
            margin: 0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            color: #aaccff;
            font-size: 1.3rem;
            text-decoration: none;
            background: #2d2d44;
            padding: 8px 25px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: #3d3d5c;
            color: white;
        }
        .game-container {
            background: #23233a;
            max-width: 550px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 50px;
            box-shadow: 0 15px 0 #0d0d1a;
        }
        h2 {
            font-size: 3rem;
            margin: 0 0 10px;
            color: #ffb347;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #0f1420;
            border-radius: 60px;
            padding: 12px 25px;
            margin: 15px 0 25px;
            border: 2px solid #ffb347;
            font-size: 1.4rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pairs-matched, .steps, .difficulty-display {
            background: #2a2a44;
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffd966;
            font-weight: bold;
        }
        .message {
            font-size: 1.8rem;
            color: #b8d0ff;
            margin-top: 10px;
        }
        .grid {
            display: grid;
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
            min-height: 300px;
        }
        .card {
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #3e4b5e, #2a3440);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #151e2a, 0 0 0 2px #5f7a9a;
            transition: 0.15s;
            color: white;
        }
        .card.flipped {
            background: #f5e56b;
            background: linear-gradient(145deg, #f3d779, #e6b422);
            box-shadow: 0 8px 0 #b2741e, 0 0 0 3px #ffe484;
            color: #1a1a2e;
            transform: scale(1.02);
        }
        .card.matched {
            background: #4caf9e;
            background: linear-gradient(145deg, #6ad4b3, #2a9d8f);
            box-shadow: 0 8px 0 #1e6b5e, 0 0 0 3px #a0f0d0;
            color: #ffffff;
            cursor: default;
            opacity: 0.8;
            transform: scale(0.98);
        }
        .card:active:not(.flipped):not(.matched) {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #151e2a;
        }
        .reset-btn, .change-difficulty-btn {
            background: #7a5d3c;
            border: none;
            color: white;
            font-size: 1.6rem;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #4d3b25;
            font-weight: bold;
            transition: 0.2s;
            margin: 5px;
        }
        .reset-btn:hover, .change-difficulty-btn:hover {
            background: #9b784f;
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #4d3b25;
        }
        .change-difficulty-btn {
            background: #5f7a9a;
            box-shadow: 0 6px 0 #4a5e7a;
        }
        .change-difficulty-btn:hover {
            background: #7a95b5;
        }
        .footer-note {
            margin-top: 20px;
            color: #7a7a9e;
            font-size: 1.2rem;
        }
        .difficulty-selector {
            background: #2d2d44;
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border: 3px solid #ffb347;
        }
        .difficulty-selector h3 {
            margin: 0 0 20px 0;
            color: #ffd966;
            font-size: 2rem;
        }
        .difficulty-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .difficulty-btn {
            background: #3a3a5a;
            border: none;
            color: white;
            font-size: 1.4rem;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #25253a;
            font-weight: bold;
            position: relative;
        }
        .difficulty-btn:hover {
            background: #4a4a6a;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #25253a;
        }
        .difficulty-btn.active {
            background: #ffb347;
            color: #1a1a2e;
            box-shadow: 0 5px 0 #cc8f38;
        }
        .difficulty-btn .best-badge {
            font-size: 0.8rem;
            display: block;
            margin-top: 5px;
            color: #b8d0ff;
        }
        .difficulty-btn.active .best-badge {
            color: #1a1a2e;
        }
        .start-btn {
            background: #4caf9e;
            border: none;
            color: white;
            font-size: 1.8rem;
            padding: 15px 50px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #2a9d8f;
            font-weight: bold;
            transition: 0.2s;
            display: block;
            margin: 0 auto;
        }
        .start-btn:hover {
            background: #6ad4b3;
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #2a9d8f;
        }
        .game-area {
            transition: opacity 0.3s;
        }
        @media (max-width: 500px) {
            .card { font-size: 2rem; }
            .stats { font-size: 1rem; flex-direction: column; align-items: center; }
            .difficulty-buttons { flex-direction: column; align-items: center; }
            .difficulty-btn { width: 90%; }
            .reset-btn, .change-difficulty-btn { margin: 5px 0; width: 90%; }
        }
        /* 彈窗樣式 */
        .congratulation-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(145deg, #2a2a44, #1a1a2e);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 4px solid #ffb347;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .modal-content h3 {
            color: #ffd966;
            font-size: 2.5rem;
            margin: 0 0 25px 0;
        }
        .modal-message {
            color: #b8d0ff;
            font-size: 1.8rem;
            line-height: 1.6;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
        }
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .modal-btn {
            background: #4caf9e;
            border: none;
            color: white;
            font-size: 1.4rem;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 0 #2a9d8f;
            font-weight: bold;
            transition: 0.2s;
        }
        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #2a9d8f;
        }
        .modal-btn.new-game {
            background: #ffb347;
            box-shadow: 0 5px 0 #cc8f38;
        }
        .modal-btn.change-diff {
            background: #9b5de5;
            box-shadow: 0 5px 0 #7a46b5;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">⬅️ 返回主頁</a>
    <div class="game-container">
        <h2>🧠 記憶配對</h2>
        
        <div class="difficulty-selector" id="difficultySelector">
            <h3>選擇難度</h3>
            <div class="difficulty-buttons" id="difficultyButtons"></div>
            <button class="start-btn" id="startGame">開始遊戲</button>
        </div>
        
        <div class="game-area" id="gameArea" style="display: none;">
            <div class="stats">
                <span>✅ 已配對：<span class="pairs-matched" id="pairsCount">0 / 8</span></span>
                <span>🔢 步數：<span class="steps" id="stepsCount">0</span></span>
                <span>📊 難度：<span class="difficulty-display" id="difficultyDisplay">高難度</span></span>
            </div>
            <div class="grid" id="memoryGrid"></div>
            <div class="message" id="winMessage"></div>
            <button class="reset-btn" id="resetGame">🔄 新一局</button>
            <button class="change-difficulty-btn" id="changeDifficulty">更改難度</button>
            <div class="footer-note">點擊卡片翻牌，配對所有表情符號</div>
        </div>
    </div>

    <script>
        (function() {
            const allEmojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔'];
            
            const difficulties = {
                low: { pairs: 4, cols: 4, rows: 2, name: '低難度', emojiCount: 4 },
                medium: { pairs: 6, cols: 4, rows: 3, name: '中難度', emojiCount: 6 },
                high: { pairs: 8, cols: 4, rows: 4, name: '高難度', emojiCount: 8 }
            };
            
            let currentDifficulty = 'high';
            let cards = [];
            let flippedIndexes = [];
            let matchedPairs = 0;
            let steps = 0;
            let lockBoard = false;
            let timeoutHandle = null;
            let bestSteps = { low: null, medium: null, high: null };
            
            // DOM elements
            const gridElement = document.getElementById('memoryGrid');
            const pairsSpan = document.getElementById('pairsCount');
            const stepsSpan = document.getElementById('stepsCount');
            const winMessageDiv = document.getElementById('winMessage');
            const difficultyDisplay = document.getElementById('difficultyDisplay');
            const difficultySelector = document.getElementById('difficultySelector');
            const gameArea = document.getElementById('gameArea');
            const startGameBtn = document.getElementById('startGame');
            const changeDifficultyBtn = document.getElementById('changeDifficulty');
            const resetGameBtn = document.getElementById('resetGame');
            const difficultyButtonsContainer = document.getElementById('difficultyButtons');
            
            // Load best scores
            function loadBestScores() {
                const saved = localStorage.getItem('memoryBestScores');
                if (saved) {
                    bestSteps = JSON.parse(saved);
                } else {
                    bestSteps = { low: null, medium: null, high: null };
                }
            }
            function saveBestScores() {
                localStorage.setItem('memoryBestScores', JSON.stringify(bestSteps));
            }
            
            // 動態產生難度按鈕並顯示最佳紀錄
            function renderDifficultyButtons() {
                difficultyButtonsContainer.innerHTML = '';
                for (const [level, config] of Object.entries(difficulties)) {
                    const btn = document.createElement('button');
                    btn.className = `difficulty-btn ${level === currentDifficulty ? 'active' : ''}`;
                    btn.dataset.level = level;
                    btn.innerHTML = `${config.name} (${config.pairs}對)<span class="best-badge">${bestSteps[level] !== null ? `🏆 ${bestSteps[level]}步` : '✨ 無紀錄'}</span>`;
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentDifficulty = level;
                    });
                    difficultyButtonsContainer.appendChild(btn);
                }
            }
            
            function updateStats() {
                const config = difficulties[currentDifficulty];
                pairsSpan.textContent = `${matchedPairs} / ${config.pairs}`;
                stepsSpan.textContent = steps;
                difficultyDisplay.textContent = config.name;
            }
            
            function showCongratulationPopup() {
                const config = difficulties[currentDifficulty];
                const best = bestSteps[currentDifficulty];
                let message = `🎉 恭喜完成 ${config.name}！\n\n步數：${steps}\n配對對數：${config.pairs} 對\n\n`;
                if (best === null || steps < best) {
                    bestSteps[currentDifficulty] = steps;
                    saveBestScores();
                    message += `🏆 新紀錄！最佳步數：${steps}`;
                    // 更新難度選擇器中的最佳紀錄顯示
                    renderDifficultyButtons();
                } else {
                    message += `最佳紀錄：${best} 步`;
                }
                
                const modal = document.createElement('div');
                modal.className = 'congratulation-modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>🎊 恭喜！ 🎊</h3>
                        <div class="modal-message">${message.replace(/\n/g, '<br>')}</div>
                        <div class="modal-buttons">
                            <button class="modal-btn new-game">新一局</button>
                            <button class="modal-btn change-diff">更改難度</button>
                        </div>
                    </div>
                `;
                
                modal.querySelector('.new-game').addEventListener('click', () => {
                    modal.remove();
                    resetGame();
                });
                modal.querySelector('.change-diff').addEventListener('click', () => {
                    modal.remove();
                    showDifficultySelector();
                });
                
                document.body.appendChild(modal);
            }
            
            function checkWin() {
                const config = difficulties[currentDifficulty];
                if (matchedPairs === config.pairs) {
                    setTimeout(showCongratulationPopup, 300);
                }
            }
            
            function initCards() {
                const config = difficulties[currentDifficulty];
                const selectedEmojis = allEmojis.slice(0, config.emojiCount);
                let deck = [...selectedEmojis, ...selectedEmojis];
                for (let i = deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [deck[i], deck[j]] = [deck[j], deck[i]];
                }
                cards = deck.map((emoji, index) => ({
                    id: index,
                    emoji: emoji,
                    matched: false,
                    flipped: false
                }));
                flippedIndexes = [];
                matchedPairs = 0;
                steps = 0;
                lockBoard = false;
                if (timeoutHandle) clearTimeout(timeoutHandle);
                updateStats();
                winMessageDiv.textContent = '';
                gridElement.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
                gridElement.style.gridTemplateRows = `repeat(${config.rows}, 1fr)`;
            }
            
            function renderBoard() {
                gridElement.innerHTML = '';
                cards.forEach((card, index) => {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card';
                    if (card.matched) {
                        cardDiv.classList.add('matched');
                        cardDiv.textContent = card.emoji;
                    } else if (card.flipped) {
                        cardDiv.classList.add('flipped');
                        cardDiv.textContent = card.emoji;
                    } else {
                        cardDiv.textContent = '?';
                    }
                    cardDiv.dataset.index = index;
                    cardDiv.addEventListener('click', () => onCardClick(index));
                    gridElement.appendChild(cardDiv);
                });
            }
            
            function onCardClick(index) {
                if (lockBoard) return;
                if (cards[index].matched) return;
                if (cards[index].flipped) return;
                if (flippedIndexes.length === 2) return;
                
                cards[index].flipped = true;
                flippedIndexes.push(index);
                renderBoard();
                
                if (flippedIndexes.length === 2) {
                    steps++;
                    updateStats();
                    checkMatch();
                }
            }
            
            function checkMatch() {
                const [idx1, idx2] = flippedIndexes;
                const card1 = cards[idx1];
                const card2 = cards[idx2];
                
                if (card1.emoji === card2.emoji) {
                    card1.matched = true;
                    card2.matched = true;
                    matchedPairs++;
                    updateStats();
                    flippedIndexes = [];
                    renderBoard();
                    checkWin();
                } else {
                    lockBoard = true;
                    timeoutHandle = setTimeout(() => {
                        card1.flipped = false;
                        card2.flipped = false;
                        flippedIndexes = [];
                        lockBoard = false;
                        renderBoard();
                        timeoutHandle = null;
                    }, 800);
                    renderBoard();
                }
            }
            
            function resetGame() {
                if (timeoutHandle) {
                    clearTimeout(timeoutHandle);
                    timeoutHandle = null;
                }
                initCards();
                renderBoard();
            }
            
            function showDifficultySelector() {
                if (timeoutHandle) clearTimeout(timeoutHandle);
                lockBoard = false;
                gameArea.style.display = 'none';
                difficultySelector.style.display = 'block';
                renderDifficultyButtons(); // 確保顯示最新最佳紀錄
            }
            
            function startGame() {
                difficultySelector.style.display = 'none';
                gameArea.style.display = 'block';
                initCards();
                renderBoard();
            }
            
            function changeDifficulty() {
                showDifficultySelector();
            }
            
            // 初始化
            loadBestScores();
            renderDifficultyButtons();
            
            // 事件綁定
            startGameBtn.addEventListener('click', startGame);
            changeDifficultyBtn.addEventListener('click', changeDifficulty);
            resetGameBtn.addEventListener('click', resetGame);
            
            // 預設高難度選中
            currentDifficulty = 'high';
        })();
    </script>
</body>
</html>"<!-- Test comment -->"
